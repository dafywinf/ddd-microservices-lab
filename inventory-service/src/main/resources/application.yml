server:
  port: 8082

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest
    producer:
      properties:
        acks: all
  mongodb:
    uri: mongodb://localhost:27018/inventory_db?replicaSet=rs0&directConnection=true

app:
  topics:
    orders: orders.v1
    inventory: inventory.v1
